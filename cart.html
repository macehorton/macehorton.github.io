<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For The Beaches | Your Cart</title>
    <style>
        :root {
            --brand-pink: #FFC0CB;
            --brand-border: #D02090;
            --brand-dark: #800040;
            --footer-height: 60px;
            --header-height: 180px; 
        }

        body {
            margin: 0;
            font-family: 'Arial Black', sans-serif;
            background-color: #ffffff;
            padding-bottom: calc(var(--footer-height) + 40px);
            padding-top: var(--header-height);
            display: flex;
            flex-direction: column;
            align-items: center; 
        }

        .fixed-logo-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100vh;
            z-index: -2;
            background-image: url('https://images.unsplash.com/photo-1544550581-5f7ceaf7f992?auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-position: center;
            opacity: 0.15;
        }

        header {
            position: fixed;
            top: 0; left: 0; width: 100%; height: var(--header-height);
            background-color: var(--brand-pink);
            border-bottom: 8px solid var(--brand-border);
            z-index: 3000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        h1 {
            font-size: clamp(2rem, 8vw, 4.5rem); 
            color: var(--brand-dark);
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 15px; 
            font-weight: 900;
            text-align: center;
        }

        nav {
            width: 100%;
            background-color: var(--brand-dark);
            margin-top: 10px;
        }

        nav ul {
            list-style: none;
            display: flex;
            justify-content: center;
            margin: 0; padding: 0;
        }

        nav a {
            color: white;
            text-decoration: none;
            font-weight: bold;
            min-height: 48px;
            display: flex;
            align-items: center;
            padding: 0 25px;
        }

        .cart-container {
            width: 100%;
            max-width: 900px;
            margin: 40px auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 1;
        }

        .cart-table {
            width: 100%;
            background: rgba(255, 255, 255, 0.95);
            border-collapse: collapse;
            border: 4px solid var(--brand-pink);
            border-radius: 15px;
            overflow: hidden;
            margin-bottom: 30px;
        }

        .cart-table th {
            background-color: var(--brand-pink);
            color: var(--brand-dark);
            padding: 15px;
            text-transform: uppercase;
        }

        .cart-table td {
            padding: 15px;
            border-bottom: 1px solid var(--brand-pink);
            text-align: center;
            color: var(--brand-dark);
        }

        .checkout-btn {
            background-color: var(--brand-border);
            color: white;
            padding: 20px 50px;
            text-decoration: none;
            font-size: 1.5rem;
            border-radius: 50px;
            font-weight: bold;
            transition: 0.3s;
        }

        .checkout-btn:hover {
            background-color: var(--brand-dark);
            transform: scale(1.05);
        }

        footer {
            position: fixed;
            bottom: 0; left: 0; width: 100%;
            height: var(--footer-height);
            background-color: var(--brand-dark);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 4000;
        }
    </style>
</head>
<body>
    <div class="fixed-logo-container"></div>
    <header>
        <h1>FOR THE BEACHES</h1>
        <nav>
            <ul>
                <li><a href="index.html">HOME</a></li>
                <li><a href="bikinis.html">BIKINIS</a></li>
                <li><a href="sale.html">SALE</a></li>
            </ul>
        </nav>
    </header>

   <main class="cart-container">
    <h2 style="color: var(--brand-dark); font-size: 2.5rem;">YOUR CART</h2>
    <table class="cart-table">
        <thead>
            <tr>
                <th>Item</th>
                <th>Price</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="cart-items">
            </tbody>
        <tfoot>
            <tr>
                <td><strong>TOTAL</strong></td>
                <td id="cart-total"><strong>$0.00</strong></td>
                <td><button onclick="clearCart()" style="background:none; border:none; color:red; cursor:pointer; font-weight:bold;">Clear All</button></td>
            </tr>
        </tfoot>
    </table>
    <a href="checkout.html" class="checkout-btn">PROCEED TO CHECKOUT</a>
</main>

<script>
    function displayCart() {
        const cart = JSON.parse(localStorage.getItem('beachCart')) || [];
        const container = document.getElementById('cart-items');
        const totalDisplay = document.getElementById('cart-total');
        
        container.innerHTML = '';
        let total = 0;

        if (cart.length === 0) {
            container.innerHTML = '<tr><td colspan="3">Your cart is empty!</td></tr>';
        } else {
            cart.forEach((item, index) => {
                total += item.price;
                container.innerHTML += `
                    <tr>
                        <td>${item.name}</td>
                        <td>$${item.price.toFixed(2)}</td>
                        <td><button onclick="removeItem(${index})" style="color:red; cursor:pointer;">Remove</button></td>
                    </tr>
                `;
            });
        }
        
        totalDisplay.innerHTML = `<strong>$${total.toFixed(2)}</strong>`;
    }

    function removeItem(index) {
        let cart = JSON.parse(localStorage.getItem('beachCart'));
        cart.splice(index, 1);
        localStorage.setItem('beachCart', JSON.stringify(cart));
        displayCart();
    }

    function clearCart() {
        localStorage.removeItem('beachCart');
        displayCart();
    }

    // Run this when the page loads
    displayCart();
</script>

    <footer><p>For the Beaches 2026.</p></footer>
</body>
</html>
