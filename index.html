<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For The Beaches | Home</title>
    <style>
        :root {
            --brand-pink: #FFC0CB;
            --brand-border: #D02090;
            --brand-dark: #800040;
            --footer-height: 60px;
            --header-height: 180px; 
        }

        body {
            margin: 0;
            font-family: 'Arial Black', sans-serif;
            background-color: #ffffff;
            padding-bottom: calc(var(--footer-height) + 40px);
            padding-top: var(--header-height);
            display: flex;
            flex-direction: column;
            align-items: center; 
        }

        .fixed-logo-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100vh;
            z-index: -2;
            background-image: url('https://images.unsplash.com/photo-1544550581-5f7ceaf7f992?auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-position: center;
            opacity: 0.15;
        }

        header {
            position: fixed;
            top: 0; left: 0; width: 100%; height: var(--header-height);
            background-color: var(--brand-pink);
            border-bottom: 8px solid var(--brand-border);
            z-index: 3000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        h1 {
            font-size: clamp(2rem, 8vw, 4.5rem); 
            color: var(--brand-dark);
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 15px; 
            font-weight: 900;
            text-align: center;
        }

        nav {
            width: 100%;
            background-color: var(--brand-dark);
            margin-top: 10px;
        }

        nav ul {
            list-style: none;
            display: flex;
            justify-content: center;
            margin: 0; padding: 0;
        }

        nav a {
            color: white;
            text-decoration: none;
            font-weight: bold;
            min-height: 48px;
            display: flex;
            align-items: center;
            padding: 0 25px;
        }

        .home-container {
            width: 100%;
            max-width: 1000px;
            margin: 40px auto;
            padding: 0 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            position: relative;
            z-index: 1;
        }

        .hero-image-card {
            width: 100%;
            max-width: 800px;
            border: 8px solid var(--brand-pink);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            margin-bottom: 30px;
        }

        .hero-image-card img {
            width: 100%;
            display: block;
        }

        .welcome-box {
            background: rgba(255, 255, 255, 0.9);
            padding: 30px;
            border-radius: 15px;
            border: 3px solid var(--brand-border);
            max-width: 700px;
        }

        .welcome-text {
            font-size: 1.5rem;
            color: var(--brand-dark);
            font-weight: bold;
            margin: 0;
        }

        footer {
            position: fixed;
            bottom: 0; left: 0; width: 100%;
            height: var(--footer-height);
            background-color: var(--brand-dark);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 4000;
        }
    </style>
</head>
<body>
    <div class="fixed-logo-container"></div>
    <header>
        <h1>FOR THE BEACHES</h1>
        <nav>
            <ul>
                <li><a href="index.html">HOME</a></li>
                <li><a href="bikinis.html">BIKINIS</a></li>
                <li><a href="sale.html">SALE</a></li>
                <li><a href="cart.html" style="color: var(--brand-pink); border-left: 1px solid rgba(255,255,255,0.2);">CART 🛒</a></li>
            </ul>
        </nav>
    </header>

    <main class="home-container">
        <div class="hero-image-card">
            <img src="https://img.huffingtonpost.com/asset/5ce86282210000af0ed0f401.jpeg" alt="Plus sized women in beautiful swimwear alt="Group of women on beach">
        </div>
        <div class="welcome-box">
            <p class="welcome-text">Welcome to the Beachfront! Here, you will find all the swimsuits you need to look nice for your next summer getaway. Find your next fit today!</p>
        </div>
    </main>

    <footer>
        <p>For the Beaches 2026.</p>
    </footer>
</body>
</html>
